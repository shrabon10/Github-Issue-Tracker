<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Tailwind + Daisy UI -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <!-- Title and Favicon -->
        <title>Github Issue Tracker</title>
        <link
            rel="shortcut icon"
            href="./assets/Aperture.png"
            type="image/x-icon"
        />

        <!-- Stylesheet -->
        <link rel="stylesheet" href="../Github-Issue-Tracker/Style/style.css">
    </head>

<body>
<body>
    <header class="bg-white mb-[50px]">
      <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><i class="fa-brands fa-github"></i>GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <label class="input pl-10">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>



    

    






    <script src="./scripts/home.js"></script>
</body>
</html>
