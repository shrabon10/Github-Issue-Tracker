<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Tailwind + Daisy UI -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <!-- Title and Favicon -->
        <title>Github Issue Tracker</title>
        <link
            rel="shortcut icon"
            href="./assets/github-logo.png"
            type="image/x-icon"
        />

        <!-- Stylesheet -->
        <link rel="stylesheet" href="./Style/style.css" />
    </head>
    <body>
        <!-- Nav sections -->
        <header class="bg-white mb-[60px]">
            <div class="navbar bg-base-100 shadow-sm px-4 md:px-10 lg:px-20">
                <div class="flex-1">
                    <div class="dropdown md:hidden">
                        <div
                            tabindex="0"
                            role="button"
                            class="btn btn-ghost p-2"
                        >
                            <i class="fa-brands fa-github text-2xl"></i>
                        </div>

                        <ul
                            tabindex="0"
                            class="dropdown-content menu bg-base-100/70 rounded-box z-10 mt-3 w-52 p-2 shadow"
                        >
                            <li
                                class="px-2 py-1 text-lg text-center font-semibold"
                            >
                                GitHub Issues Tracker
                            </li>

                            <li>
                                <a
                                    class="flex justify-center"
                                    href="./index.html"
                                >
                                    <i
                                        class="text-center fa-solid fa-arrow-right-from-bracket"
                                    ></i>
                                    Log Out
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- DESKTOP LOGO -->
                    <a class="btn btn-ghost text-xl hidden md:inline-flex">
                        <i class="fa-brands fa-github"></i>
                        GitHub Issues Tracker
                    </a>
                </div>

                <!-- RIGHT SIDE -->
                <div class="flex gap-2 items-center">
                    <label class="relative">
                        <i
                            class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"
                        ></i>

                        <input
                            id="searchInput"
                            type="search"
                            required
                            placeholder="Search issues..."
                            class="pl-10 pr-3 py-2 border rounded-md w-full"
                        />
                    </label>

                    <button class="btn btn-primary" id="searchBtn">
                        Search
                    </button>
                </div>
            </div>
        </header>
        <main class="bg-[##F8FAFC] min-h-screen max-w-[75%] mx-auto">
            <!-- Tabs per category -->
            <section id="tabs" class="p-6 flex gap-3 bg-white mb-4 rounded-lg ">
                <button
                    onclick="showTab('allTab')"
                    id="allTab"
                    class="btn tab-btn w-[120px] h-10"
                >
                    All
                </button>
                <button
                    onclick="showTab('openTab')"
                    id="openTab"
                    class="btn tab-btn w-[120px] h-10"
                >
                    Open
                </button>
                <button
                    onclick="showTab('closedTab')"
                    id="closedTab"
                    class="btn tab-btn w-[120px] h-10"
                >
                    Closed
                </button>
            </section>
            <!-- Count Number-->
            <section id="issue-info" class="rounded-lg">
                <div
                    class="p-6 flex justify-between items-center bg-white border-b border-[#E4E4E7]"
                >
                    <div class="flex gap-2 items-center">
                        <div
                            class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center"
                        >
                            <img
                                class="w-8 h-8"
                                src="../assets/Aperture.png"
                                alt=""
                            />
                        </div>
                        <div>
                            <h3 class="mb-[3px] font-semibold text-xl">
                                <span id="total-count">50</span> Issues
                            </h3>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>
                    <!-- Color open and closed   -->
                    <div class="flex gap-4">
                        <div id="open-badge" class="flex items-center gap-2 italic font-bold">
                            <div
                                class="rounded-full w-4 h-4 bg-[#00A96E] "
                            ></div>
                            Open
                        </div>
                        <div id="closed-badge" class="flex items-center gap-2 italic font-bold">
                            <div
                                class="rounded-full w-4 h-4 bg-[#A855F7]"
                            ></div>
                            Closed
                        </div>
                    </div>
                </div>
                <!-- The All container-->
                <div id="spinner" class="hidden">
                    <section
                        class="flex justify-center items-center min-h-screen"
                    >
                        <span
                            class="loading loading-spinner loading-xl text-primary"
                        ></span>
                    </section>
                </div>
                <div
                    id="card-container"
                    class="bg-[#FBFBFB] p-6 mb-[60px] grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
                >
                    <!-- API Dynamic -->
                </div>
            </section>
            <section>
                <dialog
                    id="my_modal_5"
                    class="modal modal-bottom sm:modal-middle"
                >
                    <!-- Dynamic modal -->
                </dialog>
            </section>
        </main>

        <script src="./scripts/count.js"></script>
        <script src="./scripts/logout.js"></script>
        <script src="./scripts/modal.js"></script>
        <script src="./scripts/find.js"></script>
        <script src="./scripts/toggle.js"></script>
        <script src="./scripts/display.js"></script>
    </body>
</html>
